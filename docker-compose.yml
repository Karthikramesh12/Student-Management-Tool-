version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: student_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studentdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: student_server
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/studentdb
      PORT: 3000
    ports:
      - "3000:3000"

  client:
    build: ./client
    container_name: student_client
    restart: always
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  postgres_data: